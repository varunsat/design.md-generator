# Build and publish the design-md-generator packages to npmjs.org.
#
# Triggers:
#   - on every push to main and pull_request: install, typecheck, test, build (CI)
#   - on a published GitHub Release: also publish the workspace packages
#
# Notes:
#   - This is a pnpm monorepo. Each public workspace package under
#     `packages/` is published; pnpm rewrites `workspace:*` deps to
#     concrete versions at publish time.
#   - Publishing uses npm Trusted Publishing (OIDC) — no NPM_TOKEN
#     secret needed. The publish job has `id-token: write` so npm can
#     verify the workflow against the Trusted Publisher entry on each
#     package's settings page on npmjs.org.

name: CI / Publish

on:
  push:
    branches: [main]
  pull_request:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  ci:
    name: Test & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        # Version is read from `packageManager` in package.json.
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Build before typecheck so that the cli's `tsc --noEmit` can
      # resolve `@creoit.com/design-md-core` types (the package exposes
      # types via dist/index.d.ts).
      - name: Build
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

  publish:
    name: Publish to npmjs.org (OIDC)
    needs: ci
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # Required for npm Trusted Publishing — lets the runner mint an
      # OIDC token that npm verifies against the Trusted Publisher entry.
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        # Version is read from `packageManager` in package.json.
        uses: pnpm/action-setup@v4

      - name: Set up Node (with npmjs.org registry)
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org/

      # npm CLI must be 11.5.1+ for trusted publishing. Node 20 ships
      # with an older npm; upgrade in-place.
      - name: Upgrade npm to a Trusted-Publishing-aware version
        run: npm install -g npm@latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Publish public workspace packages
        # --no-git-checks: pnpm otherwise refuses to publish from a detached
        # checkout (releases run on the tag's commit, not the main branch).
        # --access public: required for scoped packages on first publish.
        # --provenance: emits a signed provenance attestation alongside.
        run: pnpm -r --filter './packages/*' publish --access public --provenance --no-git-checks
