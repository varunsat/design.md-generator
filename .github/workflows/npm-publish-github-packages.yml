# Build and publish the design-md-generator packages to npmjs.org.
#
# Triggers:
#   - on every push to main and pull_request: install, typecheck, test, build (CI)
#   - on a published GitHub Release: also publish the workspace packages
#
# Notes:
#   - This is a pnpm monorepo. We publish each public workspace package
#     under the `packages/` glob. pnpm rewrites `workspace:*` deps to the
#     actual version at publish time.
#   - Publishing requires an `NPM_TOKEN` repo secret holding an npmjs.org
#     "automation" access token for the @varunsat scope.

name: CI / Publish

on:
  push:
    branches: [main]
  pull_request:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  ci:
    name: Test & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        # Version is read from `packageManager` in package.json.
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Build before typecheck so that the cli's `tsc --noEmit` can
      # resolve `@varunsat/design-md-core` types (the package exposes
      # types via dist/index.d.ts).
      - name: Build
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

  publish:
    name: Publish to npmjs.org
    needs: ci
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        # Version is read from `packageManager` in package.json.
        uses: pnpm/action-setup@v4

      - name: Set up Node (with npmjs.org registry)
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org/

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Publish public workspace packages
        # --no-git-checks: pnpm otherwise refuses to publish from a detached
        # checkout (releases run on the tag's commit, not the main branch).
        # --access public: required for scoped packages on first publish.
        run: pnpm -r --filter './packages/*' publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
